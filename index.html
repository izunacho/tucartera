const formatCurrency = n => {
  if (n === null || n === undefined || isNaN(n)) return '$0.00';
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }).format(n);
};
const formatNumber = (n, decimals = 4) => {
  if (n === 0 || !n) return '0';
  if (Math.abs(n) < 0.000001) return n.toExponential(2);
  if (Math.abs(n) < 0.01) return n.toFixed(8);
  if (Math.abs(n) < 1) return n.toFixed(6);
  return n.toLocaleString('en-US', {
    maximumFractionDigits: decimals
  });
};

// Debounce hook
const useDebounce = (value, delay = 400) => {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setDebounced(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return debounced;
};

// Búsqueda en CoinGecko (universo cripto completo, ~17k monedas)
const searchCryptos = async query => {
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(query)}`);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.coins || []).slice(0, 15).map(c => ({
      id: `crypto:${c.id}`,
      source: 'coingecko',
      sourceId: c.id,
      symbol: (c.symbol || '').toUpperCase(),
      name: c.name,
      type: 'crypto',
      thumb: c.thumb,
      marketCapRank: c.market_cap_rank
    }));
  } catch (e) {
    return [];
  }
};

// Búsqueda en Yahoo Finance (acciones, ETFs, índices, commodities, FX, etc.)
const searchYahoo = async query => {
  try {
    const url = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=12&newsCount=0`;
    const res = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!res.ok) return [];
    const data = await res.json();
    return (data.quotes || []).filter(q => q.symbol && q.quoteType !== 'CRYPTOCURRENCY') // las cripto ya van por CoinGecko
    .map(q => ({
      id: `yahoo:${q.symbol}`,
      source: 'yahoo',
      sourceId: q.symbol,
      symbol: q.symbol,
      name: q.shortname || q.longname || q.symbol,
      type: (q.quoteType || 'stock').toLowerCase(),
      exchange: q.exchDisp || q.exchange
    }));
  } catch (e) {
    return [];
  }
};

// Precio cripto puntual desde CoinGecko
const getCryptoPrices = async ids => {
  if (!ids.length) return {};
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_24hr_change=true`);
    if (!res.ok) return {};
    return await res.json();
  } catch (e) {
    return {};
  }
};

// Precio acción desde Yahoo Finance
const getYahooQuotes = async symbols => {
  if (!symbols.length) return {};
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}`;
    const res = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!res.ok) return {};
    const data = await res.json();
    const out = {};
    (data.quoteResponse?.result || []).forEach(q => {
      out[q.symbol] = {
        usd: q.regularMarketPrice,
        usd_24h_change: q.regularMarketChangePercent,
        currency: q.currency
      };
    });
    return out;
  } catch (e) {
    return {};
  }
};

// Histórico cripto
const getCryptoHistory = async (cgId, days) => {
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=usd&days=${days}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.prices; // [[ts, price], ...]
  } catch (e) {
    return null;
  }
};

// Histórico Yahoo: usa endpoint chart
const getYahooHistory = async (symbol, days) => {
  try {
    const range = days === '1' ? '1d' : days === '7' ? '5d' : days === '30' ? '1mo' : days === '90' ? '3mo' : '1y';
    const interval = days === '1' ? '15m' : days === '7' ? '1h' : '1d';
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}`;
    const res = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!res.ok) return null;
    const data = await res.json();
    const result = data.chart?.result?.[0];
    if (!result) return null;
    const timestamps = result.timestamp || [];
    const closes = result.indicators?.quote?.[0]?.close || [];
    return timestamps.map((t, i) => [t * 1000, closes[i]]).filter(p => p[1] != null);
  } catch (e) {
    return null;
  }
};
